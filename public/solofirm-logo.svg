<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SoloFirm Logo</title>
  <desc id="desc">A modern SoloFirm logo with a geometric SF monogram and wordmark.</desc>

  <defs>
    <linearGradient id="sfGrad" x1="36" y1="36" x2="284" y2="284" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="softGlow" x="0" y="0" width="320" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.145 0 0 0 0 0.388 0 0 0 0 0.922 0 0 0 0.22 0"/>
    </filter>
  </defs>

  <!-- Icon container -->
  <g transform="translate(24,24)">
    <rect x="0" y="0" width="272" height="272" rx="56" fill="#FFFFFF"/>
    <rect x="0" y="0" width="272" height="272" rx="56" fill="url(#sfGrad)"/>

    <!-- subtle glow -->
    <g filter="url(#softGlow)">
      <circle cx="136" cy="136" r="92" fill="#60A5FA" opacity="0.25"/>
    </g>

    <!-- stylized S -->
    <path d="M188 84C174 67 149 56 123 56C83 56 56 77 56 108C56 137 75 154 114 161L142 166C161 170 168 176 168 186C168 199 155 208 133 208C109 208 90 199 77 183" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- stylized F -->
    <path d="M116 70V214M116 102H206M116 146H182" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

    <!-- corner cut accent -->
    <path d="M220 0H272V52" fill="white" opacity="0.16"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(336,86)">
    <text x="0" y="98" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="110" font-weight="800" letter-spacing="-2" fill="url(#textGrad)">SoloFirm</text>
    <text x="4" y="146" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="34" font-weight="500" letter-spacing="0.8" fill="#334155">Launch your business in one run</text>
  </g>
</svg>
